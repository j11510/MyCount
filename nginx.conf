events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # WebSocket Support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # HTTP to HTTPS Redirect
    server {
        listen 80 default_server;
        server_name _;
        
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server (Frontend & Backend)
    server {
        listen 443 ssl default_server;
        server_name mycount.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/mycount.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mycount.duckdns.org/privkey.pem;

        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        # Frontend
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Backend API
        location /api {
            # Removed trailing slash to prevent path mismatch
            proxy_pass http://backend:8080; 
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket support for Backend
        location /ws {
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        client_max_body_size 20M;
    }

    # Portainer (HTTP) - Redirect to HTTPS 9443
    server {
        listen 9000;
        server_name mycount.duckdns.org;
        return 301 https://$host:9443$request_uri; 
    }

    # Portainer (HTTPS) - Port 9443
    server {
            listen 9443 ssl;
            server_name mycount.duckdns.org;

            # [수정] SSL 세션 캐시 추가 (연결 안정성 향상)
            ssl_session_cache shared:SSL:10m;
            ssl_session_timeout 1h;

        location / {
            proxy_pass http://portainer:9000;
            
            # [핵심] 호스트 헤더에 포트를 명시하여 Portainer의 리다이렉션 오류 방지
            proxy_set_header Host $host:9443; 
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 및 연결 유지
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # 타임아웃 대폭 확대
            proxy_read_timeout 86400;
        }
    }
}