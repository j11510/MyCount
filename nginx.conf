events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # WebSocket Support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # [수정] SSL 보안 설정 공통화 (코드 중복 방지 및 보안 강화)
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;

    # HTTP to HTTPS Redirect
    server {
        listen 80 default_server;
        server_name _;
        
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server (Frontend & Backend)
    server {
        listen 443 ssl default_server;
        server_name mycount.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/mycount.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mycount.duckdns.org/privkey.pem;

        # [추가] 보안 헤더 (HSTS 등)
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        # Frontend
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Backend API
        location /api/ {
            # [기존] proxy_pass http://backend:8080;
            # [변경] 백엔드 주소 뒤에 /를 붙여 context path 처리를 명확히 할 수 있습니다.
            proxy_pass http://backend:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket support for Backend
        location /ws/ {
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        client_max_body_size 20M;
    }

    # Portainer (HTTPS 리다이렉트 권장)
    # [기존] Port 9000 (HTTP) 서버 설정은 보안상 9443(HTTPS)으로 리다이렉트하는 것이 좋습니다.
    server {
        listen 9000;
        server_name mycount.duckdns.org;
        return 301 https://$host:9443$request_uri; 
        
        /* 이전 로직 주석 처리
        location / {
            proxy_pass http://portainer:9000;
            ...
        }
        */
    }

    # Portainer (HTTPS) - Port 9443
    server {
        listen 9443 ssl;
        server_name mycount.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/mycount.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mycount.duckdns.org/privkey.pem;

        location / {
            # Portainer 내부 통신은 9000으로 전달
            proxy_pass http://portainer:9000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}