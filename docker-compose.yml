services:
  # 1. MariaDB
  db:
    image: mariadb:latest
    container_name: mariadb-server
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: chdb
    ports:
      - "3306:3306"
    volumes:
      # [변경] 하단 volumes 정의와 일치하도록 명명된 볼륨(named volume) 사용 권장
      # 기존: - ./mysql_data:/var/lib/mysql (호스트 경로)
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$$MARIADB_ROOT_PASSWORD || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Backend
  backend:
    build:
      context: ./spring_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:mariadb://db:3306/chdb
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      db:
        condition: service_healthy # [추가] DB가 완전히 준비된 후 백엔드 시작

  # 3. Frontend
  frontend:
    build:
      context: ./frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend

  # 4. Nginx
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "9000:9000"
      - "9443:9443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
      - portainer # [추가] Portainer 프록시를 위해 의존성 추가

  # 5. Portainer
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    # Nginx를 통해 접속하므로 호스트 포트는 주석 처리 유지 (보안상 좋음)
    # ports:
    #   - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  # 6. OpenSSH
  ssh:
    image: linuxserver/openssh-server:latest
    container_name: paul-ssh
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Seoul
      - PASSWORD_ACCESS=true
      - USER_PASSWORD=${SSH_PASSWORD}
      - USER_NAME=admin
    ports:
      - "2222:2222"
    volumes:
      - ssh_config:/config

# [수정] 서비스에서 사용하는 볼륨 정의 일치화
volumes:
  mariadb_data: # db 서비스에서 사용
  portainer_data:
  ssh_config:
