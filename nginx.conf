events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # WebSocket Support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # HTTP to HTTPS Redirect
    server {
        listen 80 default_server;
        server_name _;
        
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server (Frontend & Backend)
    server {
        listen 443 ssl default_server;
        server_name mycount.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/mycount.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mycount.duckdns.org/privkey.pem;

        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        # Frontend
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Backend API
        location /api {
            proxy_pass http://backend:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket support for Backend
        location /ws {
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        client_max_body_size 20M;
    }

    # Portainer (HTTP) - Redirect to HTTPS 9443
    server {
        listen 9000;
        server_name mycount.duckdns.org;
        
        # [수정된 부분] C-Style 주석(/* */)을 삭제하고 # 주석을 사용했습니다.
        # Original logic for port 9000 is now redirected for security
        return 301 https://$host:9443$request_uri; 
    }

    # Portainer (HTTPS) - Port 9443
    server {
        listen 9443 ssl;
        server_name mycount.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/mycount.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mycount.duckdns.org/privkey.pem;

        location / {
            proxy_pass http://portainer:9000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}