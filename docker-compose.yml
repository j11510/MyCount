services:
  # 1. MariaDB
  db:
    image: mariadb:latest
    container_name: mariadb-server
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: chdb
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$$MARIADB_ROOT_PASSWORD || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Backend
  backend:
    build:
      context: ./spring_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:mariadb://db:3306/chdb
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      - db

  # 3. Frontend
  frontend:
    build:
      context: ./frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend

  # 4. Nginx
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "9000:9000"
      - "9443:9443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

  # 5. Portainer
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    # ports:
    #   - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  # 6. OpenSSH
  ssh:
    image: linuxserver/openssh-server:latest
    container_name: paul-ssh
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Seoul
      - PASSWORD_ACCESS=true
      - USER_PASSWORD=${SSH_PASSWORD}
      - USER_NAME=admin
    ports:
      - "2222:2222"
    volumes:
      - ssh_config:/config

volumes:
  mariadb_data:
  portainer_data:
  ssh_config:
