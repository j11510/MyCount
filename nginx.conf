events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # WebSocket Support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # HTTP to HTTPS Redirect
    server {
        listen 80 default_server;
        server_name _;
        
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server (Frontend & Backend)
    server {
        listen 443 ssl default_server;
        server_name mycount.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/mycount.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mycount.duckdns.org/privkey.pem;

        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        # Frontend
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # [수정된 부분] Backend API
        location /api {
            # 이전 로직 주석 처리: proxy_pass http://backend:8080/;
            # 뒤에 슬래시(/)를 제거하여 /api 경로를 그대로 유지한 채 백엔드에 전달합니다.
            proxy_pass http://backend:8080; 
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # [수정된 부분] WebSocket
        location /ws {
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        client_max_body_size 20M;
    }

    # Portainer (HTTP) - Redirect to HTTPS 9443
    server {
        listen 9000;
        server_name mycount.duckdns.org;
        return 301 https://$host:9443$request_uri; 
    }

    # Portainer (HTTPS) - Port 9443
    server {
        listen 9443 ssl;
        server_name mycount.duckdns.org;

        ssl_certificate /etc/letsencrypt/live/mycount.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mycount.duckdns.org/privkey.pem;

        location / {
            proxy_pass http://portainer:9000;
            proxy_http_version 1.1;
            
            # [추가/수정] Portainer의 엄격한 Origin 체크 통과를 위한 설정
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # [핵심] WebSocket 및 연결 유지
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # [보안] Portainer 403 방지를 위해 Origin 헤더 유지
            proxy_set_header Origin ""; 
            
            /* 이전 로직 주석 처리
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            ...
            */
        }
    }
}