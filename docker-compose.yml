services:
  # 1. MariaDB
  db:
    image: mariadb:latest
    container_name: mariadb-server
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: admin1234
      MARIADB_DATABASE: chdb
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mariadb-admin ping -h localhost -u root -padmin1234 || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Backend
  backend:
    build:
      context: ./backend
    restart: always
    environment:
      - DATABASE_URL=mysql+pymysql://root:admin1234@db:3306/chdb?charset=utf8mb4
      - SECRET_KEY=your_secret_key
    depends_on:
      - db

  # 3. Frontend
  frontend:
    build:
      context: ./frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend

  # 4. Nginx
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  # 5. Portainer
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  # 6. OpenSSH
  ssh:
    image: linuxserver/openssh-server:latest
    container_name: paul-ssh
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Seoul
      - PASSWORD_ACCESS=true
      - USER_PASSWORD=admin1234
      - USER_NAME=paul
    ports:
      - "2222:2222"
    volumes:
      - ssh_config:/config

volumes:
  mariadb_data:
  portainer_data:
  ssh_config:
