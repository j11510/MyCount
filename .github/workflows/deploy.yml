name: Deploy for Termux (Self-hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted  # 태블릿에 설치된 러너에서 실행됩니다.
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy and Restart Services
        run: |
          # 1. 최신 소스 코드 반영
          # (Checkout 액션이 소스를 가져오므로 최신 상태임)

          # 2. 환경 변수 설정
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > backend/.env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> backend/.env
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" > frontend/.env.local

          # 3. 백엔드 의존성 설치 및 재시작 (PM2 사용 예시)
          cd backend
          python -m pip install -r requirements.txt
          pm2 restart mycount-backend || pm2 start "python -m uvicorn main:app --host 0.0.0.0 --port 8000" --name mycount-backend
          
          # 4. 프론트엔드 빌드 및 재시작
          cd ../frontend
          npm install
          npm run build
          pm2 restart mycount-frontend || pm2 start "npm run start" --name mycount-frontend
